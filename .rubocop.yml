AllCops:
  NewCops: enable
  SuggestExtensions: false
  TargetRubyVersion: 3.1

Style/StringLiterals:
  EnforcedStyle: double_quotes

Style/StringLiteralsInInterpolation:
  EnforcedStyle: double_quotes

Style/Documentation:
  Enabled: false

Style/FormatStringToken:
  Enabled: false


Lint/NestedPercentLiteral:
  Exclude:
    - spec/**/*.rb

Lint/EmptyBlock:
  Exclude:
    - spec/**/*.rb

Layout/LineLength:
  Max: 160

Metrics/MethodLength:
  Max: 15
  CountAsOne:
    - array
    - hash

Metrics/ClassLength:
  Max: 200

Metrics/ModuleLength:
  Max: 150

Metrics/BlockLength:
  Exclude:
    - spec/**/*.rb

Metrics/AbcSize:
  Exclude:
    - spec/**/*

Metrics/ParameterLists:
  Enabled: false

Style/OneClassPerFile:
  Exclude:
    - spec/**/*

Style/RescueModifier:
  Enabled: false

Security/MarshalLoad:
  Exclude:
    - spec/**/*
